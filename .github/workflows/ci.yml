name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y pathspec || true
          pip install -r requirements.txt
          pip install "pathspec==0.12.1"

      - name: Install Ansible
        run: pip install ansible

      - name: Create vault password file
        run: echo "${{ secrets.VAULT_PASSWORD }}" > .vault_pass.txt

      - name: Generate .env from Vault
        run: |
          ansible-playbook deploy.yml --vault-password-file .vault_pass.txt --tags "env_only"

      - name: Debug files
        run: |
          pwd
          ls -la

      - name: Validate required env vars
        run: |
          source .env
          if [ -z "$QDRANT_API_KEY" ]; then echo "QDRANT_API_KEY missing"; exit 1; fi
          if [ -z "$DOCKERHUB_USERNAME" ]; then echo "DOCKERHUB_USERNAME missing"; exit 1; fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then echo "DOCKERHUB_TOKEN missing"; exit 1; fi
          if [ -z "$KAFKA_BOOTSTRAP_SERVERS" ]; then echo "missing kafka"; exit 1; fi
          if [ -z "$KAFKA_USERNAME" ]; then echo "missing kafka user"; exit 1; fi
          if [ -z "$KAFKA_PASSWORD" ]; then echo "missing kafka pass"; exit 1; fi

      - name: Start Qdrant
        run: |
          source .env
          docker network create app-net || true

          docker run -d \
            --network app-net \
            -p $QDRANT_PORT:$QDRANT_PORT \
            -e QDRANT__SERVICE__API_KEY=$QDRANT_API_KEY \
            --name qdrant \
            qdrant/qdrant

      - name: Wait for Qdrant
        run: |
          source .env
          for i in {1..30}; do
            if curl -sf \
              -H "api-key: $QDRANT_API_KEY" \
              http://localhost:6333 > /dev/null; then
              echo "Qdrant is ready"
              exit 0
            fi
            sleep 2
          done
          docker logs qdrant || true
          exit 1

      - name: Start Kafka + Zookeeper (with auth)
        run: |
          docker network create app-net || true

          docker run -d \
            --network app-net \
            --name zookeeper \
            -e ZOOKEEPER_CLIENT_PORT=2181 \
            confluentinc/cp-zookeeper:latest

          docker run -d \
            --network app-net \
            -p 9092:9092 \
            --name kafka \
            -e KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181 \
            -e KAFKA_LISTENERS=SASL_PLAINTEXT://0.0.0.0:9092 \
            -e KAFKA_ADVERTISED_LISTENERS=SASL_PLAINTEXT://kafka:9092 \
            -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=SASL_PLAINTEXT:SASL_PLAINTEXT \
            -e KAFKA_INTER_BROKER_LISTENER_NAME=SASL_PLAINTEXT \
            -e KAFKA_SASL_ENABLED_MECHANISMS=PLAIN \
            -e KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL=PLAIN \
            -e KAFKA_OPTS=-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf \
            -e KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 \
            confluentinc/cp-kafka:latest \
            bash -c '
              echo "KafkaServer {
                org.apache.kafka.common.security.plain.PlainLoginModule required
                username=\"'$KAFKA_USERNAME'\"
                password=\"'$KAFKA_PASSWORD'\"
                user_'$KAFKA_USERNAME'=\"'$KAFKA_PASSWORD'\";
              };" > /etc/kafka/kafka_server_jaas.conf &&
              /etc/confluent/docker/run
            '

      - name: Wait for Kafka
        run: |
          for i in {1..30}; do
            nc -z localhost 9092 && echo "Kafka is ready" && exit 0
            sleep 2
          done
          docker logs kafka
          exit 1

      - name: Configure DVC (DagsHub)
        run: |
          source .env
          dvc remote modify origin --local access_key_id "$DAGSHUB_ACCESS_KEY"
          dvc remote modify origin --local secret_access_key "$DAGSHUB_SECRET_KEY"

      - name: DVC pull data & artifacts
        run: dvc pull -q || true

      - name: Reproduce pipeline (train model)
        run: dvc repro

      - name: Run tests
        run: |
          source .env
          pytest -q | tee test_output.txt

      - name: Login to DockerHub
        run: |
          source .env
          echo $DOCKERHUB_TOKEN | docker login -u $DOCKERHUB_USERNAME --password-stdin

      - name: Build and push
        run: |
          source .env
          IMAGE="$DOCKERHUB_USERNAME/bd-lab-4:latest"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Generate DevSecOps metadata
        run: |
          source .env
          echo "docker_image:" > dev_sec_ops.yml
          echo "  name: $DOCKERHUB_USERNAME/bd-lab-4" >> dev_sec_ops.yml
          echo "  tag: latest" >> dev_sec_ops.yml

      - name: Upload DevSecOps metadata
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-report
          path: dev_sec_ops.yml