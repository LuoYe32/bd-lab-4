services:
  model:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_started

  consumer:
    build: .
    command: python -m src.consumer.consumer
    env_file:
      - .env
    depends_on:
      - kafka

  kafka:
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "9092" ]
      interval: 5s
      retries: 10
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: SASL_PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      KAFKA_TOPIC_NAME: predictions
      KAFKA_TOPIC_PARTITIONS: 3

      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

      KAFKA_OPTS: -Djava.security.auth.login.config=/etc/kafka/jaas.conf

    command: >
      bash -c '
        echo "KafkaServer {
          org.apache.kafka.common.security.plain.PlainLoginModule required
          username=\"admin\"
          password=\"admin-secret\"
          user_admin=\"admin-secret\";
        };" > /etc/kafka/jaas.conf &&

        echo "security.protocol=SASL_PLAINTEXT
        sasl.mechanism=PLAIN
        sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username=\"admin\" password=\"admin-secret\";" > /etc/kafka/client.properties &&

        /etc/confluent/docker/run &

        echo "Waiting for Kafka to be ready..." &&
        sleep 15 &&

        kafka-topics \
          --bootstrap-server localhost:9092 \
          --command-config /etc/kafka/client.properties \
          --create \
          --if-not-exists \
          --topic $$KAFKA_TOPIC_NAME \
          --partitions $$KAFKA_TOPIC_PARTITIONS \
          --replication-factor 1 &&

        wait
      '

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    env_file:
      - .env
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}