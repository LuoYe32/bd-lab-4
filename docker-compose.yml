services:
  model:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - qdrant
      - kafka
      - kafka-init

  consumer:
    build: .
    command: python -m src.consumer.consumer
    env_file:
      - .env
    depends_on:
      - kafka
      - kafka-init

  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    env_file:
      - .env
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: SASL_PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_OPTS: -Djava.security.auth.login.config=/etc/kafka/jaas.conf

      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

    command: >
      bash -c '
        echo "KafkaServer {
          org.apache.kafka.common.security.plain.PlainLoginModule required
          username=\"${KAFKA_USERNAME}\"
          password=\"${KAFKA_PASSWORD}\"
          user_${KAFKA_USERNAME}=\"${KAFKA_PASSWORD}\";
        };" > /etc/kafka/jaas.conf &&
        /etc/confluent/docker/run
      '

  kafka-init:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      echo 'Waiting for Kafka...' &&
      cub kafka-ready -b kafka:9092 1 30 &&
      kafka-topics
      --bootstrap-server kafka:9092
      --command-config /tmp/client.properties
      --create
      --if-not-exists
      --topic predictions
      --partitions 3
      --replication-factor 1 &&
      echo 'Topic predictions is ready'
      "
    environment:
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
    volumes:
      - ./kafka-client.properties:/tmp/client.properties:ro

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    env_file:
      - .env
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}